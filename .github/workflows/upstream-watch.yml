name: 上游监听

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-watch
  cancel-in-progress: true

env:
  UPSTREAM_REPO: luongnv89/claude-howto
  UPSTREAM_BRANCH: main
  STATE_BRANCH: sync-state
  STATE_FILE: .github/upstream-state.json

jobs:
  watch:
    name: 检测上游变更
    runs-on: ubuntu-latest
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取上游最新 SHA
        id: upstream
        run: |
          latest_sha="$(git ls-remote "https://github.com/${UPSTREAM_REPO}.git" "refs/heads/${UPSTREAM_BRANCH}" | awk '{print $1}')"
          if [ -z "$latest_sha" ]; then
            echo "无法获取上游最新 SHA" >&2
            exit 1
          fi
          echo "latest_sha=$latest_sha" >> "$GITHUB_OUTPUT"

      - name: 加载状态文件
        run: |
          mkdir -p "$(dirname "$STATE_FILE")"

          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH"
            if git cat-file -e "origin/$STATE_BRANCH:$STATE_FILE" 2>/dev/null; then
              git show "origin/$STATE_BRANCH:$STATE_FILE" > "$STATE_FILE"
            fi
          fi

          python3 .github/scripts/upstream_watch.py ensure-state \
            --state-file "$STATE_FILE" \
            --upstream-repo "$UPSTREAM_REPO" \
            --upstream-branch "$UPSTREAM_BRANCH"

      - name: 读取当前状态
        id: inspect
        run: |
          python3 .github/scripts/upstream_watch.py inspect \
            --state-file "$STATE_FILE" \
            --upstream-repo "$UPSTREAM_REPO" \
            --upstream-branch "$UPSTREAM_BRANCH" \
            --github-output "$GITHUB_OUTPUT"

      - name: 更新状态
        id: update
        env:
          LATEST_SHA: ${{ steps.upstream.outputs.latest_sha }}
        run: |
          python3 .github/scripts/upstream_watch.py update \
            --state-file "$STATE_FILE" \
            --upstream-repo "$UPSTREAM_REPO" \
            --upstream-branch "$UPSTREAM_BRANCH" \
            --latest-sha "$LATEST_SHA" \
            --github-output "$GITHUB_OUTPUT"

      - name: 发送钉钉告警
        if: steps.update.outputs.needs_alert == 'true' && env.DINGTALK_WEBHOOK != ''
        env:
          LATEST_SHA: ${{ steps.upstream.outputs.latest_sha }}
          LAST_SYNCED_SHA: ${{ steps.inspect.outputs.last_synced_sha }}
        run: |
          python3 .github/scripts/upstream_watch.py notify-dingtalk \
            --latest-sha "$LATEST_SHA" \
            --last-synced-sha "$LAST_SYNCED_SHA" \
            --webhook "$DINGTALK_WEBHOOK" \
            --secret "$DINGTALK_SECRET" \
            --upstream-repo "$UPSTREAM_REPO" \
            --upstream-branch "$UPSTREAM_BRANCH"

      - name: 标记告警已发送
        if: steps.update.outputs.needs_alert == 'true' && env.DINGTALK_WEBHOOK != ''
        env:
          LATEST_SHA: ${{ steps.upstream.outputs.latest_sha }}
        run: |
          python3 .github/scripts/upstream_watch.py mark-alerted \
            --state-file "$STATE_FILE" \
            --upstream-repo "$UPSTREAM_REPO" \
            --upstream-branch "$UPSTREAM_BRANCH" \
            --latest-sha "$LATEST_SHA"

      - name: 提示缺少钉钉 webhook
        if: steps.update.outputs.needs_alert == 'true' && env.DINGTALK_WEBHOOK == ''
        run: |
          {
            echo "## 上游监听"
            echo ""
            echo "- 检测到上游新提交，但未配置 \`DINGTALK_WEBHOOK\` secret，未发送告警。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 持久化状态到 sync-state 分支
        if: always()
        run: |
          cp "$STATE_FILE" /tmp/upstream-state.json
          state_worktree="/tmp/sync-state-worktree"
          rm -rf "$state_worktree"

          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH"
            git worktree add --force "$state_worktree" "origin/$STATE_BRANCH"
          else
            git worktree add --detach "$state_worktree"
            (
              cd "$state_worktree"
              git switch --orphan "$STATE_BRANCH"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          mkdir -p "$state_worktree/$(dirname "$STATE_FILE")"
          cp /tmp/upstream-state.json "$state_worktree/$STATE_FILE"

          (
            cd "$state_worktree"
            git add "$STATE_FILE"

            if git diff --cached --quiet; then
              echo "状态文件已是最新。"
              exit 0
            fi

            GIT_AUTHOR_NAME="github-actions[bot]" \
            GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
            GIT_COMMITTER_NAME="github-actions[bot]" \
            GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
            git commit -m "维护(同步): 更新上游状态"

            git push origin "HEAD:$STATE_BRANCH"
          )

          git worktree remove --force "$state_worktree"

      - name: 写入执行摘要
        if: always()
        env:
          LATEST_SHA: ${{ steps.upstream.outputs.latest_sha }}
          LAST_SEEN_SHA: ${{ steps.update.outputs.previous_seen_sha }}
          LAST_SYNCED_SHA: ${{ steps.update.outputs.previous_synced_sha }}
          NEEDS_ALERT: ${{ steps.update.outputs.needs_alert }}
          HAS_NEW_UPSTREAM: ${{ steps.update.outputs.has_new_upstream }}
        run: |
          {
            echo "## 上游监听"
            echo ""
            echo "- 上游仓库：\`$UPSTREAM_REPO\`"
            echo "- 上游分支：\`$UPSTREAM_BRANCH\`"
            echo "- 最新 SHA：\`${LATEST_SHA:-unknown}\`"
            echo "- 上次已见 SHA：\`${LAST_SEEN_SHA:-未记录}\`"
            echo "- 当前已同步 SHA：\`${LAST_SYNCED_SHA:-未记录}\`"
            echo "- 检测到新提交：\`${HAS_NEW_UPSTREAM:-false}\`"
            echo "- 需要发送告警：\`${NEEDS_ALERT:-false}\`"
          } >> "$GITHUB_STEP_SUMMARY"
